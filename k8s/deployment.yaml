apiVersion: v1
kind: Namespace
metadata:
  name: kluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kluster-app
  namespace: kluster
  labels:
    app: kluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kluster
  template:
    metadata:
      labels:
        app: kluster
    spec:
      containers:
      - name: kluster
        image: kluster:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kluster-secrets
              key: database-url
        - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: kluster-secrets
              key: clerk-publishable-key
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kluster-secrets
              key: clerk-secret-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kluster-secrets
              key: openai-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kluster-service
  namespace: kluster
spec:
  selector:
    app: kluster
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kluster-ingress
  namespace: kluster
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: kluster.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kluster-service
            port:
              number: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: kluster-secrets
  namespace: kluster
type: Opaque
stringData:
  database-url: "postgresql://user:pass@localhost:5432/kluster"
  clerk-publishable-key: "pk_test_..."
  clerk-secret-key: "sk_test_..."
  openai-key: "sk-..."
